# AutoTalk 配置

# 后端: anthropic(云端,需 ANTHROPIC_API_KEY) 或 ollama(本地,免 key、数据不出本机)
provider: ollama
ollama_host: http://localhost:11434
# —— 切到本地 Ollama:把 provider 改成 ollama,并把下面的模型换成 ollama 标签 ——
#   provider: ollama
#   model: qwen2.5vl:7b        # 读截图必须用【视觉模型】,生成也用它
#   summary_model: llama3.2    # 摘要纯文本即可,可用你已有的文本模型

# 读截图方式: vlm(视觉模型直接读,默认) 或 ocr(本地 OCR + 头像几何判定,发言人更准)
#   ocr 模式需装后端;macOS 最轻量: pip install pillow numpy pyobjc-framework-Vision pyobjc-framework-Quartz
read_mode: ocr         # 已切到 ocr:本地 OCR+几何判定,发言人最准(需装后端,见 requirements)
ocr_backend: auto      # auto / vision(macOS原生) / easyocr / paddleocr / tesseract
me_side: right         # "我"在右侧(微信默认);镜像布局改 left
crop_left: 0.40        # 桌面微信整窗截图:裁掉左侧会话列表(约左 40%);手机/已裁好的截图设 0
crop_bottom: 0.12      # 裁掉底部输入框/工具栏(约底 12%),避免把输入区误读成"最新消息"

# 使用的模型(anthropic 填 Claude 名,需支持视觉;ollama 填模型标签,vlm 模式读截图须为视觉模型)
model: qwen2.5vl:7b
# 可选:分别为"读截图"和"生成回复"指定模型(留空则用上面的 model)
vision_model:
reply_model:
# 维护联系人记忆摘要用的便宜模型
summary_model: llama3.2

# 微信在 macOS 上的应用名/进程名(部分版本是 "微信")
app_name: WeChat

# 轮询间隔(秒)。别低于 3,既省钱也降低风控风险。
poll_interval_seconds: 5

# 每次读取最近多少条消息作为上下文
read_last_n: 8

# true = 只弹确认框、不真正发送(安全演练)。跑通后用 --send 或改成 false 才会真发。
dry_run: true

# 发送方式: enter(直接回车发送) 或 cmd_enter(Command+回车),取决于你微信的设置
send_with: enter

# 默认人设(对应 skills/personas/<名字>.md)
default_persona: serious

# 联系人 -> 人设 映射(按聊天窗口标题匹配)。也可在该联系人的记忆文件里写 "人设: xxx"。
contacts:
  # 张三: serious
  # 小美: flirty

# 是否在每次发送后自动更新该联系人的记忆摘要
update_memory: true
